name: BIST 100 Gunluk Tarama

on:
  schedule:
    # Hafta ici 15:40 UTC = 18:40 TR (BIST kapanis 18:00, veri otursun diye)
    - cron: "40 15 * * 1-5"
  workflow_dispatch:  # Manuel calistirma butonu (Actions sekmesinden)

permissions:
  contents: write

jobs:
  tarama:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bagimliliklari kur
        run: pip install yfinance pandas

      - name: Taramayi calistir
        run: python tarama.py

      - name: Sonuclari commit et
        run: |
          git config user.name "bist-tarama-bot"
          git config user.email "actions@github.com"
          git add sonuclar/
          git diff --cached --quiet || git commit -m "Tarama sonucu: $(date +'%Y-%m-%d')"
          git push
